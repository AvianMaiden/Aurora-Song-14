#region Medical

- type: entity
  id: SpawnPointMedic
  parent: SpawnPointJobBase
  name: Medic
  components:
  - type: SpawnPoint
    job_id: Medic
  - type: Sprite
    sprite: _NF/Markers/jobs.rsi
    layers:
      - state: green
      - state: medic

#region Service

- type: entity
  id: SpawnPointService
  parent: SpawnPointJobBase
  name: Service
  components:
  - type: SpawnPoint
    job_id: Service
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - state: serviceworker

#region Command

- type: entity
  parent: SpawnPointHeadOfPersonnel
  id: SpawnPointColonialRepresentative
  name: colonial representative
  components:
  - type: SpawnPoint
    job_id: ColonialRepresentative
  - type: Sprite
    layers:
      - state: green
      - sprite: _AS/Markers/jobs.rsi
        state: cr
